name: Chat Context Staleness Check

on:
  pull_request:
    branches: [main]

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx scripts/check-context-staleness.mjs
